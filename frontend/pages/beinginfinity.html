<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSuggest-BeingInfinity</title>
    <link rel="stylesheet" href="../css/beinginfinity.css">
</head>
<body>
    <span class="gear">&#x2699;</span>
    <span class="pill">
    <span class="online-dot">&#x2022;</span>
    online |
    &#x23F0; - ms
</span>
    <div class="main-content">
        <h1 class = "logo"><span class="being">Being</span> Infinity</h1>
        <p class = "tagline">
            One million phrases. Four Algorithms.
            Prefix Based Auto Suggest.
        </p>
        <div>
            <span class="lens">&#128270;</span>
            <input class = "search-box"
                type="text"
                placeholder="Start typing to search..." id="search-bar"
            >
            <div id = "search-suggestions" ></div>
        </div>
    </div>
    <script src="../js/beinginfinity.js"></script>
</body>
</html>
